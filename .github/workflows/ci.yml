name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check chaosrank/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  benchmark-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test — rank with real traces
        run: |
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --incidents benchmarks/real_traces/social_network_incidents.csv \
            --top-n 5

      - name: Smoke test — JSON output
        run: |
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --incidents benchmarks/real_traces/social_network_incidents.csv \
            --output json | python -c "import sys, json; data = json.load(sys.stdin); assert len(data) > 0"

      - name: Smoke test — litmus output
        run: |
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --incidents benchmarks/real_traces/social_network_incidents.csv \
            --output litmus | grep "kind: ChaosEngine"
