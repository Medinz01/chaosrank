name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check chaosrank/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  benchmark-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test — rank with real traces
        run: |
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --incidents benchmarks/real_traces/social_network_incidents.csv \
            --top-n 5

      - name: Smoke test — JSON output
        run: |
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --incidents benchmarks/real_traces/social_network_incidents.csv \
            --output json | python -c "import sys, json; data = json.load(sys.stdin); assert len(data) > 0"

      - name: Smoke test — litmus output
        run: |
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --incidents benchmarks/real_traces/social_network_incidents.csv \
            --output litmus | grep "kind: ChaosEngine"

      - name: Smoke test — convert kafka
        run: |
          chaosrank convert \
            --from kafka \
            --input benchmarks/examples/kafka-topics.json \
            --dry-run

      - name: Smoke test — convert asyncapi
        run: |
          chaosrank convert \
            --from asyncapi \
            --input benchmarks/examples/asyncapi-specs/ \
            --dry-run

      - name: Smoke test — rank with async deps
        run: |
          chaosrank convert \
            --from kafka \
            --input benchmarks/examples/kafka-topics.json \
            --output /tmp/async-deps.yaml
          chaosrank rank \
            --traces benchmarks/real_traces/social_network.json \
            --async-deps /tmp/async-deps.yaml \
            --top-n 5

      - name: Smoke test — rank with OTLP traces
        run: |
          chaosrank rank \
            --traces tests/fixtures/otlp_trace.json \
            --format otlp \
            --output json \
            --top-n 5 | python -c "import sys, json; d=json.load(sys.stdin); assert len(d) > 0, 'Expected ranked output, got empty list'"

      - name: Smoke test — incidents command is registered
        run: chaosrank incidents --help | grep -q "pagerduty"

      - name: Smoke test — incidents unknown format exits non-zero
        run: |
          chaosrank incidents --from unknown-source 2>&1 | grep -q "Unknown"
          # Command must exit non-zero
          ! chaosrank incidents --from unknown-source 2>/dev/null

      - name: Smoke test — incidents missing required arg exits non-zero
        run: |
          # pagerduty requires --token; omitting it should exit non-zero
          ! chaosrank incidents --from pagerduty --window 7d 2>/dev/null

      - name: Smoke test — incidents dry-run via mock HTTP
        run: |
          python - <<'EOF'
          # Patch urllib at the process level and invoke the CLI adapter directly
          import json
          from unittest.mock import MagicMock, patch
          from pathlib import Path

          fixture = json.loads(Path("tests/fixtures/pagerduty_incidents.json").read_text())
          body = json.dumps(fixture).encode()
          resp = MagicMock()
          resp.read.return_value = body
          resp.__enter__ = lambda s: s
          resp.__exit__ = MagicMock(return_value=False)

          with patch("urllib.request.urlopen", return_value=resp):
              from chaosrank.incident_adapters.pagerduty import PagerDutyAdapter
              from chaosrank.incident_adapters.csv_export import incidents_to_csv
              incidents = PagerDutyAdapter(api_key="fake").fetch(window_days=30)
              assert len(incidents) > 0, f"Expected incidents, got {incidents}"
              count = incidents_to_csv(incidents, Path("/tmp/smoke_incidents.csv"))
              assert count == len(incidents)

          print(f"OK — {len(incidents)} incidents written to /tmp/smoke_incidents.csv")
          EOF